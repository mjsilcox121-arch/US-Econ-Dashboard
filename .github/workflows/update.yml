name: Update Economic Data

on:
  schedule:
    - cron: '0 14 * * 1'   # Every Monday at 14:00 UTC
  workflow_dispatch:        # Allows manual "Run workflow" button

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch FRED data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python3 fetch_data.py
      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "Data update $(date -u +%Y-%m-%d)" && git push
