name: Weekly FRED Data Refresh

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch latest FRED data
        run: python3 scripts/fetch_fred.py
      - name: Commit and push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet \
            && echo "No changes" \
            || (git commit -m "Weekly data refresh $(date -u +%Y-%m-%d)" && git push)
